# This workflow will run daily at 06:45.
# It will install Python dependencies and run tests with a variety of Python versions.
# See documentation for help debugging smoke test issues:
#    https://lincc-ppt.readthedocs.io/en/latest/practices/ci_testing.html#version-culprit

name: Unit test smoke test

on:

  # Runs this workflow automatically
  schedule:
    - cron: 45 6 * * *
    
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    strategy:
      max-parallel: 4
      matrix:
        os: ['macos-latest','ubuntu-latest']
        python-version: ['3.11', '3.12']

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Set up - ${{ matrix.os }} - Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    # Cache the SPICE kernels + MPC obscodes that `layup bootstrap` and the
    # tests download, so a transient outage of naif.jpl.nasa.gov or
    # minorplanetcenter.net does not fail the run. See testing-and-coverage.yml.
    - name: Cache layup ephemeris + obscodes data
      uses: actions/cache@v6
      with:
        path: |
          ~/.cache/layup
          ~/Library/Caches/layup
        key: layup-data-${{ runner.os }}-v1
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        git submodule update --init
        pip install -e .[dev]
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        layup bootstrap
    - name: List dependencies
      run: |
        pip list
    - name: Run unit tests with pytest
      run: |
        # -rs surfaces skipped tests + reasons in the CI log (issue #359).
        python -m pytest -n auto -rs
